# Copilot coding-agent environment setup
#
# This workflow is picked up automatically by GitHub Copilot coding agent.
# It runs before the agent begins its task and is responsible for preparing
# a fully working Android emulator so the agent can install the app, take
# live screenshots, and run instrumentation tests during validation.
#
# Assumptions:
#   - GitHub-hosted ubuntu-latest runners are used (consistent with the
#     existing android-build-and-release.yml workflow in this repository).
#   - ANDROID_HOME is already exported by the runner image at
#     /usr/local/lib/android/sdk, and cmdline-tools/latest is present there,
#     but platform-tools and emulator are NOT installed in that base image,
#     so we install them here explicitly.
#   - Hardware acceleration is not available on GitHub-hosted runners, so
#     the emulator runs with -gpu swiftshader_indirect (software rendering).
#   - Boot can take up to 5 minutes on software rendering; the boot-wait
#     loop below allows up to 5 minutes (60 × 5 s).

name: Copilot setup steps

on:
  workflow_dispatch:

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # ---------------------------------------------------------------
      # 1. Check out the repository so Copilot has source code available
      # ---------------------------------------------------------------
      - name: Check out repository
        uses: actions/checkout@v4

      # ---------------------------------------------------------------
      # 2. Java runtime (required by both Gradle and the Android emulator)
      # ---------------------------------------------------------------
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ---------------------------------------------------------------
      # 3. Install Android SDK components that are missing from the
      #    base runner image: platform-tools, emulator, platform SDK,
      #    and the x86_64 system image.
      # ---------------------------------------------------------------
      - name: Install Android SDK components
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          set -euxo pipefail

          export PATH="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin:${ANDROID_SDK_ROOT}/platform-tools:${ANDROID_SDK_ROOT}/emulator:${PATH}"

          # Accept all licences non-interactively
          yes | sdkmanager --licenses || true

          sdkmanager \
            "platform-tools" \
            "emulator" \
            "platforms;android-34" \
            "system-images;android-34;google_apis;x86_64"

      # ---------------------------------------------------------------
      # 4. Persist PATH and ANDROID_* variables for every subsequent
      #    step (including the Copilot agent's own steps).
      # ---------------------------------------------------------------
      - name: Configure environment variables
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          set -euxo pipefail

          echo "ANDROID_HOME=${ANDROID_SDK_ROOT}"              >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT}"          >> "$GITHUB_ENV"
          echo "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin"  >> "$GITHUB_PATH"
          echo "${ANDROID_SDK_ROOT}/platform-tools"            >> "$GITHUB_PATH"
          echo "${ANDROID_SDK_ROOT}/emulator"                  >> "$GITHUB_PATH"

      # ---------------------------------------------------------------
      # 5. Create the AVD that the emulator will boot from.
      # ---------------------------------------------------------------
      - name: Create AVD
        run: |
          set -euxo pipefail

          # Suppress the "hardware profile" prompt by piping "no"
          echo "no" | avdmanager create avd \
            --name copilot-avd \
            --package "system-images;android-34;google_apis;x86_64" \
            --device "pixel"

      # ---------------------------------------------------------------
      # 6. Boot the emulator headlessly and wait until the device is
      #    fully booted (sys.boot_completed == 1).
      # ---------------------------------------------------------------
      - name: Boot emulator
        run: |
          set -euxo pipefail

          # Launch in background; redirect output to a log we can inspect
          nohup emulator \
            -avd copilot-avd \
            -no-window \
            -no-audio \
            -no-boot-anim \
            -gpu swiftshader_indirect \
            >/tmp/emulator.log 2>&1 &

          echo "Emulator PID: $!"

          # Start the adb server and wait for the device transport to appear
          adb start-server
          adb wait-for-device

          # Poll sys.boot_completed until it equals "1" or we time out
          echo "Waiting for Android boot to complete..."
          boot_completed=""
          for i in $(seq 1 60); do
            boot_completed="$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')" || true
            if [ "$boot_completed" = "1" ]; then
              echo "Boot completed after $((i * 5)) seconds."
              break
            fi
            echo "  attempt ${i}/60 – sys.boot_completed='${boot_completed}'"
            sleep 5
          done

          if [ "$boot_completed" != "1" ]; then
            echo "ERROR: emulator did not finish booting within 5 minutes."
            echo "--- emulator.log (last 50 lines) ---"
            tail -50 /tmp/emulator.log || true
            exit 1
          fi

          # Confirm the device appears in adb
          adb devices

      # ---------------------------------------------------------------
      # 7. Final verification – print tool versions and connected devices
      # ---------------------------------------------------------------
      - name: Verify environment
        run: |
          echo "=== Java ==="
          java -version

          echo "=== adb ==="
          which adb
          adb version

          echo "=== emulator ==="
          which emulator
          emulator -version 2>&1 | head -5

          echo "=== sdkmanager ==="
          which sdkmanager
          sdkmanager --version

          echo "=== avdmanager ==="
          which avdmanager

          echo "=== AVDs ==="
          avdmanager list avd

          echo "=== Connected devices ==="
          adb devices
